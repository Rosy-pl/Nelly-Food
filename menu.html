<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/menu.css">
    <title>Menu | Nelly's Food</title>
</head>
<body>

    <header class="cabecalho-menu">
        <h1>Our Menu</h1>
        <p>Explore our Caribbean food and drinks</p>
    </header>

    <main class="menu-page">

        <section class="menu-category" aria-labelledby="food-menu-title">
            <header>
                <h2 id="food-menu-title">Food Menu</h2>
            </header>

            <div class="menu-gallery">
                <figure class="menu-item">
                    <img src="../assets/imagens/Menu1.avif" alt="Food menu page 1">
                </figure>

                <figure class="menu-item">
                    <img src="../assets/imagens/Menu2.avif" alt="Food menu page 2">
                </figure>

                <figure class="menu-item">
                    <img src="../assets/imagens/Menu3.avif" alt="Food menu page 3">
                </figure>
            </div>
        </section>

        <section class="menu-category" aria-labelledby="drinks-menu-title">
            <header>
                <h2 id="drinks-menu-title">Drinks Menu</h2>
            </header>

            <div class="menu-gallery">
                <figure class="menu-item">
                    <img src="../assets/imagens/MenuDrink1.avif" alt="Drinks menu page 1">
                </figure>

                <figure class="menu-item">
                    <img src="../assets/imagens/MenuDrink2.avif" alt="Drinks menu page 2">
                </figure>
            </div>
        </section>

    </main>

    <footer class="footer-menu">
        <p>&copy; 2026 Nelly's Food. All rights reserved.</p>
    </footer>

</body>
</html>
