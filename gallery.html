<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Nelly's Food</title>
    <link rel="stylesheet" href="CSS/gallery.css">
</head>

<body>

    <header class="cabecalho-galeria">
        <h1>Our Gallery</h1>
        <p>A selection of our signature Cuban dishes.</p>
    </header>

    <main class="galeria-page">

        <section class="galeria" aria-labelledby="gallery-title">

            <h2 id="gallery-title">A glimpse of our delicious Cuban dishes.</h2>

            <div class="galeria-grid">
                <figure class="galeria-item">
                    <img src="assets/imagens/churrasco.jpeg" alt="Grilled meat served on a plate" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/friturasMalanga.jpeg"
                        alt="Crispy malanga fritters served as a side dish" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/pizza.jpeg" alt="Freshly baked pizza served at the restaurant" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/sopa.jpeg" alt="Warm homemade soup served in a bowl" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/camarão.jpg" alt="Shrimp dish prepared with Caribbean-style seasoning" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/comidas.jpg" alt="Variety of Cuban dishes served on a table" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/sandwichCubano.jpg"
                        alt="Traditional Cuban sandwich with pork, ham, cheese, and pickles" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/cotilla.jpg"
                        alt="Cuban-style roasted pork served with side dishes" class="imagem-galeria">
                </figure>

                <figure class="galeria-item">
                    <img src="assets/imagens/drink.jpg" alt="Refreshing tropical drink served in a glass" class="imagem-galeria">
                </figure>
            </div>

            <footer class="footer-galeria">
                <p>&copy; 2026 Nelly's Food. All rights reserved.</p>
            </footer>

            <div class="modal-imagem" id="modalImagem">
                <span class="fechar-modal" id="fecharModal">&times;</span>
                <img class="imagem-ampliada" id="imgAmpliada" src="" alt="">
            </div>

         <script src="JAVASCRIPT/gallery.js"></script>

</body>

</html>
